<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GovAssist — Voice Input</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #F5F8FC;
      color: #16233F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #FFFFFF;
      max-width: 420px;
      width: 90%;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      border: 1px solid #E3E9F3;
      text-align: center;
    }
    .mic-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2F6FED, #5B9EFF);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      position: relative;
    }
    .mic-ring.listening {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(47,111,237,0.5); }
      50% { box-shadow: 0 0 0 20px rgba(47,111,237,0); }
    }
    .mic-ring svg { color: white; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p { color: #5B6B84; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    #status { font-weight: 600; font-size: 16px; color: #2F6FED; margin-top: 16px; }
    .error { color: #E11D48 !important; }
    .success { color: #16A34A !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mic-ring" id="micRing">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <rect x="9" y="2" width="6" height="12" rx="3" fill="white"/>
        <path d="M5 11a7 7 0 0014 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="22" x2="16" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h2 id="heading">Requesting Microphone…</h2>
    <p id="desc">Please click <strong>Allow</strong> in the browser prompt above.</p>
    <p id="status">Waiting for permission…</p>
  </div>
  <script src="mic_permission.js"></script>
</body>
</html>
