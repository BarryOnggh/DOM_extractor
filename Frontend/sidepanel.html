<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GovAssist</title>
<link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="app">

    <!-- ===== Header ===== -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 7v6c0 5 4 8.5 9 9 5-.5 9-4 9-9V7l-9-5z" fill="currentColor"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">GovAssist</span>
          <span class="brand-status"><i class="status-dot" aria-hidden="true"></i><span id="statusLabel">Ready to help</span></span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg id="themeIconSun" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/><path d="M12 2.5v2.3M12 19.2v2.3M4.4 4.4l1.6 1.6M18 18l1.6 1.6M2.5 12h2.3M19.2 12h2.3M4.4 19.6L6 18M18 6l1.6-1.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <svg id="themeIconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" hidden><path d="M20 14.5A8.5 8.5 0 019.5 4a8.5 8.5 0 1010.5 10.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </button>
        <button class="icon-btn" id="langBtn" type="button" aria-label="Change language" title="Change language">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 5h9M8 4v2M6.5 6a10.7 10.7 0 004.9 6.6M12 6c-1 3.6-3.2 6.6-6 8.4M14 20l4-9 4 9M15.3 17h5.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <!-- ===== Current task banner ===== -->
    <div class="task-banner" id="taskBanner" hidden>
      <span class="task-eyebrow">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        CURRENT TASK
      </span>
      <span class="task-name" id="taskName">&mdash;</span>
    </div>

    <!-- ===== Chat thread ===== -->
    <main class="chat-thread" id="chatThread" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <p>Tell me what you'd like to do, and I'll walk you through it one step at a time.</p>
        <div class="suggestion-row">
          <button class="suggestion-chip" data-goal="I need to apply for the new housing grant.">Apply for housing grant</button>
          <button class="suggestion-chip" data-goal="I want to check my CPF balance.">Check CPF balance</button>
        </div>
      </div>
    </main>

    <!-- ===== Composer ===== -->
    <form class="composer" id="composerForm">
      <div class="composer-row">
        <button type="button" class="icon-btn attach-btn" id="attachBtn" aria-label="Attach a file (placeholder, not yet available)" title="Placeholder — attachments aren't wired up yet">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M21 11.5L12.5 20a4.5 4.5 0 01-6.4-6.4L14 5.7a3 3 0 014.2 4.2L10 18a1.5 1.5 0 01-2.2-2.1l7.4-7.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <input
          type="text"
          id="goalInput"
          class="goal-input"
          placeholder="Type or speak here…"
          autocomplete="off"
          aria-label="Type your request"
        />
        <button type="submit" class="send-btn" id="sendBtn">Send</button>
        <button type="button" class="mic-btn" id="micBtn" aria-label="Speak your request" title="Speak your request" aria-pressed="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z" stroke="currentColor" stroke-width="1.7"/><path d="M19 11a7 7 0 01-14 0M12 18v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </button>
      </div>
      <p class="composer-hint" id="composerHint">Tap the blue mic button to speak naturally</p>
    </form>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
